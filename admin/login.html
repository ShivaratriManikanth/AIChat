<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login | AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0c29;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }
    .bg-orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: drift 8s ease-in-out infinite;
    }
    .bg-orb:nth-child(1) { width: 500px; height: 500px; background: #4F46E5; top: -150px; left: -100px; animation-delay: 0s; }
    .bg-orb:nth-child(2) { width: 400px; height: 400px; background: #7C3AED; bottom: -100px; right: -80px; animation-delay: -3s; }
    .bg-orb:nth-child(3) { width: 300px; height: 300px; background: #2563EB; top: 40%; left: 50%; animation-delay: -5s; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* Login card */
    .login-wrapper {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      padding: 16px;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 48px 44px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
    }
    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .logo-area p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: all 0.2s;
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .input-wrap input:focus {
      border-color: #4F46E5;
      background: rgba(79, 70, 229, 0.12);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }
    .input-wrap .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.4); font-size: 16px;
      transition: color 0.2s;
    }
    .input-wrap .eye-btn:hover { color: rgba(255,255,255,0.8); }

    /* Error */
    .error-msg {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #FCA5A5;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
      position: relative;
      overflow: hidden;
    }
    .btn-submit::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-submit:hover::before { opacity: 1; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit span { position: relative; z-index: 1; }

    /* Divider */
    .divider {
      text-align: center;
      margin: 24px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
    .divider a {
      color: #818CF8;
      text-decoration: none;
      font-weight: 500;
    }
    .divider a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">🤖</div>
        <h1>AI Chatbot</h1>
        <p>Sign in to your dashboard</p>
      </div>

      <div id="errorMsg" class="error-msg">⚠️ Invalid email or password. Please try again.</div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePassword()" aria-label="Toggle password visibility">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn-submit"><span>Sign In →</span></button>
      </form>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('eyeBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errorMsg');
      errorEl.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('.btn-submit span');
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('saas_token', data.token);
          localStorage.setItem('saas_role', data.role);
          localStorage.setItem('saas_client_id', data.clientId || '');
          btn.textContent = '✅ Success!';
          setTimeout(() => { 
            if (data.role === 'super') {
              window.location.href = '/admin/superadmin.html';
            } else {
              window.location.href = '/admin/';
            }
          }, 500);
        } else {
          errorEl.style.display = 'flex';
          btn.textContent = 'Sign In →';
        }
      } catch (err) {
        errorEl.style.display = 'flex';
        btn.textContent = 'Sign In →';
      }
    });

    // Hide error when typing
    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('input', () => {
        document.getElementById('errorMsg').style.display = 'none';
      });
    });
  </script>
</body>
</html>
