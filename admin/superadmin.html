<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin | AI Chatbot SaaS Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      background: linear-gradient(135deg, #1a1a2e, #302b63);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-logo {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .topbar-brand h1 { font-size: 17px; font-weight: 700; color: #fff; }
    .topbar-brand span { font-size: 11px; color: rgba(255,255,255,0.4); }
    .super-badge {
      background: linear-gradient(135deg, #F59E0B, #EF4444);
      color: white; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px;
    }

    /* Layout */
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; margin-bottom: 28px;
    }
    .stat-card {
      background: white; border-radius: 14px;
      padding: 22px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 16px;
    }
    .stat-icon {
      width: 50px; height: 50px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .stat-icon.blue { background: #EEF2FF; }
    .stat-icon.green { background: #ECFDF5; }
    .stat-icon.orange { background: #FFF7ED; }
    .stat-label { font-size: 12px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-top: 2px; }

    /* Cards */
    .card {
      background: white; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid #f0f0f0;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f5f5f5;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h2 {
      font-size: 16px; font-weight: 700; color: #1a1a2e;
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 24px; }

    /* Create client form */
    .create-form {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 12px; font-weight: 600;
      color: #666; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input, .form-group select {
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: 14px; font-family: inherit;
      color: #333; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #4F46E5;
      background: white;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .form-actions {
      grid-column: 1 / -1;
      display: flex; gap: 12px; align-items: center;
    }
    .btn {
      padding: 11px 24px; border: none; border-radius: 10px;
      cursor: pointer; font-size: 14px; font-weight: 600;
      font-family: inherit; transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(79, 70, 229, 0.4); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-outline {
      background: white; color: #555;
      border: 1.5px solid #e5e7eb;
    }
    .btn-outline:hover { background: #f9fafb; }

    /* Status message */
    #statusMsg {
      font-size: 13px; padding: 10px 14px;
      border-radius: 8px; display: none;
    }
    #statusMsg.success { background: #ECFDF5; color: #059669; border: 1px solid #A7F3D0; display: block; }
    #statusMsg.error { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; display: block; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.5px; color: #888; font-weight: 600;
      background: #fafafa; border-bottom: 1px solid #f0f0f0;
    }
    .data-table tbody td {
      padding: 14px 16px; font-size: 13.5px;
      border-bottom: 1px solid #f5f5f5; color: #444;
      vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: #fafbff; }

    .badge {
      display: inline-block; padding: 4px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-active { background: #ECFDF5; color: #059669; }
    .badge-inactive { background: #F3F4F6; color: #888; }
    .badge-basic { background: #EFF6FF; color: #2563EB; }
    .badge-standard { background: #F0FDF4; color: #16A34A; }
    .badge-premium { background: #FFF7ED; color: #EA580C; }

    .plan-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600;
    }

    .client-email { font-weight: 500; color: #4F46E5; }
    .client-company { font-weight: 600; color: #1a1a2e; }

    .btn-sm {
      padding: 5px 14px; font-size: 12px; border-radius: 6px;
      border: none; cursor: pointer; font-family: inherit; font-weight: 500;
      transition: all 0.15s;
    }
    .btn-sm-danger { background: #FEE2E2; color: #DC2626; }
    .btn-sm-danger:hover { background: #FECACA; }
    .btn-sm-view { background: #EEF2FF; color: #4F46E5; }
    .btn-sm-view:hover { background: #E0E7FF; }

    .empty-state {
      text-align: center; padding: 40px 20px;
      color: #999; font-size: 14px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; display: block; }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr; }
      .create-form { grid-template-columns: 1fr; }
    }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); display: flex;
      align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-content {
      background: white; border-radius: 16px; padding: 24px;
      width: 100%; max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transform: translateY(20px); transition: transform 0.2s;
    }
    .modal-overlay.show .modal-content { transform: translateY(0); }
    .modal-header { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">🤖</div>
      <div>
        <h1>AI Chatbot SaaS</h1>
        <span>Super Admin Console</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="super-badge">⚡ SUPER ADMIN</span>
      <a href="/admin/" style="font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none;">← Back to Dashboard</a>
      <a href="#" onclick="logout()" style="font-size:13px;color:#fb7185;text-decoration:none;font-weight:600;margin-left:15px;border-left:1px solid rgba(255,255,255,0.1);padding-left:15px;">🚪 Logout</a>
    </div>
  </nav>

  <div class="page">

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-icon blue">🏢</div>
        <div>
          <div class="stat-label">Total Clients</div>
          <div class="stat-value" id="statTotal">–</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div>
          <div class="stat-label">Active Clients</div>
          <div class="stat-value" id="statActive">–</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">💰</div>
        <div>
          <div class="stat-label">Monthly Revenue</div>
          <div class="stat-value" id="statRevenue">–</div>
        </div>
      </div>
    </div>

    <!-- Create client -->
    <div class="card">
      <div class="card-header">
        <h2>➕ Onboard New Client</h2>
      </div>
      <div class="card-body">
        <div class="create-form">
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="companyName" placeholder="e.g. Acme Corp">
          </div>
          <div class="form-group">
            <label>Client Email</label>
            <input type="email" id="clientEmail" placeholder="client@company.com">
          </div>
          <div class="form-group">
            <label>Subscription Plan</label>
            <select id="planId">
              <option value="1">🔵 Basic Plan — $29/mo</option>
              <option value="2">🟢 Standard Plan — $79/mo</option>
              <option value="3">🟠 Premium Plan — $199/mo</option>
            </select>
          </div>
          <div class="form-group">
            <label>Temporary Password</label>
            <input type="text" id="clientPassword" placeholder="Auto-generated if blank">
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="createClient()">🚀 Create Client & Send Email</button>
            <div id="statusMsg"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Clients table -->
    <div class="card">
      <div class="card-header">
        <h2>🏢 Active Clients</h2>
        <button class="btn btn-outline" onclick="loadClients()" style="font-size:13px;padding:8px 16px;">🔄 Refresh</button>
      </div>
      <div style="padding:0;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Company</th>
              <th>Email</th>
              <th>Plan</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Password</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="clientTable">
            <tr><td colspan="7"><div class="empty-state"><span class="icon">⏳</span>Loading clients...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-content">
      <div class="modal-header">✏️ Edit Client Credentials</div>
      <div class="form-group" style="margin-bottom: 12px;">
        <label>Email Address</label>
        <input type="email" id="editEmail">
      </div>
      <div class="form-group" style="margin-bottom: 20px;">
        <label>Password</label>
        <input type="text" id="editPassword">
      </div>
      <div class="form-actions" style="justify-content: flex-end;">
        <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-primary" id="saveEditBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    const PLAN_NAMES = { 1: 'Basic', 2: 'Standard', 3: 'Premium' };
    const PLAN_PRICES = { 1: 29, 2: 79, 3: 199 };
    const PLAN_BADGES = {
      1: 'badge-basic', 2: 'badge-standard', 3: 'badge-premium'
    };

    function logout() {
      localStorage.removeItem('saas_token');
      localStorage.removeItem('saas_client_id');
      window.location.href = 'login.html';
    }

    async function fetchAuth(url, options = {}) {
      const token = localStorage.getItem('saas_token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      if (!options.headers) options.headers = {};
      options.headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(url, options);
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('saas_token');
        window.location.href = 'login.html';
      }
      return res;
    }

    async function loadClients() {
      try {
        const res = await fetchAuth('/api/super/clients');
        if (!res.ok) throw new Error('Failed');
        const clients = await res.json();

        // Stats
        document.getElementById('statTotal').textContent = clients.length;
        const active = clients.filter(c => c.payment_status === 'active' || c.payment_status === 'COD_PENDING').length;
        document.getElementById('statActive').textContent = active;
        const rev = clients.filter(c => c.payment_status === 'active' || c.payment_status === 'COD_PENDING')
          .reduce((sum, c) => sum + (PLAN_PRICES[c.plan_id] || 0), 0);
        document.getElementById('statRevenue').textContent = '₹' + rev.toLocaleString();

        if (clients.length === 0) {
          document.getElementById('clientTable').innerHTML =
            `<tr><td colspan="7"><div class="empty-state"><span class="icon">🏢</span>No clients yet. Onboard your first client above!</div></td></tr>`;
          return;
        }

        document.getElementById('clientTable').innerHTML = clients.map(c => {
          const planName = PLAN_NAMES[c.plan_id] || 'Basic';
          const planBadge = PLAN_BADGES[c.plan_id] || 'badge-basic';
          const statusBadge = c.payment_status === 'active' ? 'badge-active' : 'badge-inactive';
          const date = c.created_at ? new Date(c.created_at).toLocaleDateString() : '–';
          return `
            <tr>
              <td><span class="client-company">${c.company_name || '–'}</span></td>
              <td><span class="client-email">${c.email}</span></td>
              <td><span class="badge ${planBadge}">${planName}</span></td>
              <td><span class="badge ${statusBadge}">${c.payment_status || 'inactive'}</span></td>
              <td style="color:#888;font-size:13px;">${date}</td>
              <td style="font-family:monospace;font-size:12px;color:#666;">${c.password || '****'}</td>
              <td style="display:flex;gap:8px;">
                <button class="btn-sm" style="background:#F3F4F6;color:#333;" onclick="editClient('${c.id}', '${c.email}', '${c.password}')">Edit</button>
                <button class="btn-sm btn-sm-view" onclick="alert('Bot ID: ${c.id}')">View</button>
                <button class="btn-sm btn-sm-danger" onclick="deleteClient('${c.id}')">Delete</button>
              </td>
            </tr>`;
        }).join('');
      } catch (e) {
        document.getElementById('clientTable').innerHTML =
          `<tr><td colspan="7"><div class="empty-state"><span class="icon">⚠️</span>Failed to load clients. Is the server running?</div></td></tr>`;
      }
    }

    async function createClient() {
      const company = document.getElementById('companyName').value.trim();
      const email = document.getElementById('clientEmail').value.trim();
      const planId = document.getElementById('planId').value;
      const password = document.getElementById('clientPassword').value.trim();
      const msg = document.getElementById('statusMsg');
      msg.className = ''; msg.style.display = '';

      if (!company || !email) {
        msg.textContent = '⚠️ Company name and email are required.';
        msg.className = 'error'; return;
      }

      try {
        const body = { company_name: company, email, plan_id: planId };
        if (password) body.password = password;

        const res = await fetchAuth('/api/super/clients', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          msg.textContent = `✅ Client "${company}" created! Login email has been dispatched.`;
          msg.className = 'success';
          document.getElementById('companyName').value = '';
          document.getElementById('clientEmail').value = '';
          document.getElementById('clientPassword').value = '';
          loadClients();
        } else {
          const err = await res.json().catch(() => ({}));
          msg.textContent = '❌ ' + (err.error || 'Failed to create client.');
          msg.className = 'error';
        }
      } catch (e) {
        msg.textContent = '❌ Network error. Please try again.';
        msg.className = 'error';
      }
    }

    let currentEditId = null;

    function editClient(id, oldEmail, oldPassword) {
      currentEditId = id;
      document.getElementById('editEmail').value = oldEmail;
      document.getElementById('editPassword').value = oldPassword;
      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
      currentEditId = null;
    }

    document.getElementById('saveEditBtn').addEventListener('click', async () => {
      if (!currentEditId) return;
      const newEmail = document.getElementById('editEmail').value.trim();
      const newPassword = document.getElementById('editPassword').value.trim();
      
      if (!newEmail || !newPassword) {
        alert('Please fill out both fields.');
        return;
      }
      
      const btn = document.getElementById('saveEditBtn');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      try {
        const res = await fetchAuth('/api/super/clients/' + currentEditId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: newEmail, password: newPassword })
        });
        if (!res.ok) {
          const err = await res.json();
          alert('Failed to update: ' + (err.error || res.statusText));
        } else {
          closeEditModal();
          loadClients();
        }
      } catch (err) {
        alert('Error updating client credentials.');
      } finally {
        btn.textContent = 'Save Changes';
        btn.disabled = false;
      }
    });

    async function deleteClient(id) {
      if (!confirm('Are you sure you want to delete this client? This cannot be undone.')) return;
      try {
        const res = await fetchAuth('/api/super/clients/' + id, { method: 'DELETE' });
        if (res.ok) loadClients();
        else alert('Failed to delete client.');
      } catch (e) { alert('Network error.'); }
    }

    loadClients();
  </script>
</body>
</html>
